<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Infinite Soldiers">
    <title>Infinite Soldiers</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <main class="infinite-soldiers-page">
        <section class="game-card">
            <div class="game-root" data-infinite-soldiers-root>
                <div class="game-hud">
                    <div class="hud-item">
                        <span class="hud-label">Squad</span>
                        <div class="hud-split" role="group" aria-label="Squad stats">
                            <div class="hud-stat">
                                <span class="hud-caption">Now</span>
                                <strong class="hud-value" data-role="squad-current">2</strong>
                            </div>
                            <div class="hud-stat hud-stat-best">
                                <span class="hud-caption">Best</span>
                                <strong class="hud-value" data-role="squad-best">2</strong>
                            </div>
                        </div>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">Distance</span>
                        <div class="hud-split" role="group" aria-label="Distance stats">
                            <div class="hud-stat">
                                <span class="hud-caption">Now</span>
                                <strong class="hud-value" data-role="distance-current">0m</strong>
                            </div>
                            <div class="hud-stat hud-stat-best">
                                <span class="hud-caption">Best</span>
                                <strong class="hud-value" data-role="distance-best">0m</strong>
                            </div>
                        </div>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">Score</span>
                        <div class="hud-split" role="group" aria-label="Score stats">
                            <div class="hud-stat">
                                <span class="hud-caption">Now</span>
                                <strong class="hud-value" data-role="score-current">0</strong>
                            </div>
                            <div class="hud-stat hud-stat-best">
                                <span class="hud-caption">Best</span>
                                <strong class="hud-value" data-role="score-best">0</strong>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stage-shell">
                    <canvas class="runner-canvas" data-role="canvas" width="420" height="720"></canvas>
                    <button type="button" class="pause-fab" data-action="pause" aria-label="Pause run" title="Pause run">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M8 6v12" />
                            <path d="M16 6v12" />
                        </svg>
                    </button>
                    <button type="button" class="restart-fab" data-action="restart" aria-label="Restart run" title="Restart run">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M12 5a7 7 0 1 1-6.63 9.24" />
                            <path d="M5.5 8.5V3.75H10.25" />
                        </svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
